content: |
  游戏关卡设计的核心原则：

  设计流程：
  1. 目标设定：关卡要教什么、测试什么
  2. 草图设计：纸面原型、流程图
  3. 灰盒测试：简单几何体搭建
  4. 美术包装：最终视觉呈现
  5. 迭代优化：根据测试反馈调整

  难度曲线：
  - 引入期：教学新机制
  - 发展期：组合使用机制
  - 挑战期：测试玩家掌握程度
  - 高潮期：最终Boss战

  节奏控制：
  - 紧张-放松交替
  - 战斗-探索-解谜混合
  - 奖励节点：每5-10分钟一个奖励

  玩家引导：
  - 视觉引导：光线、颜色、对比
  - 空间引导：路径、障碍物
  - 音效引导：提示音、环境音

  关卡类型：
  - 线性关卡：单一路径，故事驱动
  - 开放关卡：多路径，探索驱动
  - 竞技关卡：对称设计，公平竞技

  测试要点：
  - 通关时间：是否符合预期
  - 死亡热点：哪里玩家频繁死亡
  - 跳过内容：哪些内容被忽略
  - 情绪曲线：玩家情绪变化

