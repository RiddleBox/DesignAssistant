title: "卡牌构筑游戏（Deck-Building）设计"
category: game_design
tags:
  - 卡牌游戏
  - Deck-Building
  - Roguelike
  - 策略
content: |
  卡牌构筑游戏的设计要素：

  核心机制：
  1. 起始牌组：10-15张基础卡牌
  2. 卡牌获取：战斗奖励、商店购买、事件
  3. 牌组构筑：添加、移除、升级卡牌
  4. 战斗系统：回合制、能量系统、卡牌效果

  卡牌设计：
  - 攻击卡：造成伤害
  - 防御卡：获得护甲
  - 技能卡：特殊效果
  - 能力卡：持续效果
  - 诅咒卡：负面效果

  平衡性设计：
  - 能量曲线：1-3费卡牌为主
  - 协同效果：卡牌之间的combo
  - 稀有度：普通、稀有、史诗、传说
  - 强度控制：避免必选卡

  成功案例：
  - 《杀戮尖塔》：Roguelike+卡牌构筑
  - 《月圆之夜》：剧情+卡牌
  - 《欺诈之地》：多职业系统

  关键指标：
  - 单局时长：30-60分钟
  - 卡牌总数：200-400张
  - 职业数量：3-5个
  - 通关率：10-30%

