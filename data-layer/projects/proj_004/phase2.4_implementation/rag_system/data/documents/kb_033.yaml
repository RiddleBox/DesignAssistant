content: |
  游戏UI/UX设计的核心原则：

  UI设计原则：
  1. 清晰易读
     - 字体大小：最小14px
     - 对比度：文字与背景对比度>4.5:1
     - 图标识别：一眼能看懂

  2. 一致性
     - 风格统一：色彩、字体、图标
     - 交互一致：相同操作相同反馈
     - 布局规律：重要信息固定位置

  3. 反馈及时
     - 按钮反馈：点击有视觉/音效反馈
     - 加载提示：长时间操作显示进度
     - 错误提示：清晰的错误信息

  UX设计原则：
  - 减少操作步骤：3次点击内完成任务
  - 避免误操作：重要操作二次确认
  - 适配多设备：手机、平板、PC
  - 无障碍设计：色盲模式、字幕

  常见UI模块：
  - HUD：血量、能量、小地图
  - 背包系统：物品管理
  - 任务系统：任务追踪
  - 社交界面：好友、聊天

  移动端特殊考虑：
  - 拇指热区：底部易触达
  - 按钮大小：最小44x44px
  - 避免误触：按钮间距足够
  - 横竖屏适配

  测试方法：
  - 可用性测试：观察玩家操作
  - A/B测试：对比不同设计
  - 热力图：分析点击分布
  - 问卷调查：收集主观反馈

