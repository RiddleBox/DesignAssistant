  - 团队协作
content: |
  MMORPG副本设计的核心要素：

  副本类型：
  1. 单人副本：剧情推进、新手引导
  2. 小队副本：5人团队，难度适中
  3. 团队副本：10-25人，高难度
  4. 随机副本：每日挑战、资源获取

  设计要素：
  - Boss机制：阶段转换、技能组合
  - 团队配合：坦克、治疗、输出分工
  - 奖励设计：装备掉落、成就系统
  - 难度梯度：普通、困难、史诗

  关键指标：
  - 通关时间：30-60分钟
  - 通关率：普通80%、困难40%、史诗10%
  - 重复游玩：每周1-3次

  成功案例：
  - 《魔兽世界》：经典副本设计
  - 《最终幻想14》：剧情副本
  - 《剑灵》：动作副本

