title: "放置类游戏（Idle Game）设计"
category: game_design
tags:
  - 放置游戏
  - 挂机
  - 数值成长
  - 轻度
content: |
  放置类游戏的设计特点：

  核心机制：
  - 自动战斗：离线也能获得收益
  - 数值成长：指数级成长曲线
  - 转生系统：重置获得永久加成
  - 多线养成：角色、装备、技能

  设计原则：
  - 短会话：每次登录3-5分钟
  - 长期目标：数月的成长目标
  - 即时满足：频繁的数值增长反馈
  - 策略深度：资源分配、转生时机

  变现模式：
  - 加速道具：跳过等待时间
  - 离线收益：提升离线收益倍数
  - 月卡：持续收益加成
  - ARPPU：$20-40

  成功案例：
  - 《剑与远征》：放置+卡牌
  - 《最强蜗牛》：放置+收集
  - 《不思议迷宫》：放置+Roguelike

