title: "游戏新手引导设计"
category: game_design
tags:
  - 新手引导
  - 教程
  - 用户体验
  - 留存
content: |
  游戏新手引导的设计原则：

  引导类型：
  1. 强制引导：必须完成的教程
  2. 软引导：提示但不强制
  3. 情境引导：在实际游戏中学习
  4. 渐进式引导：分阶段解锁功能

  设计原则：
  - 简单开始：前3分钟只教核心玩法
  - 即时奖励：每个步骤都有奖励
  - 避免文字：用视觉和交互引导
  - 可跳过：老玩家可跳过

  关键节点：
  - 3秒：吸引注意力
  - 30秒：理解核心玩法
  - 3分钟：完成第一个循环
  - 10分钟：体验核心乐趣

  优化指标：
  - 完成率：>80%
  - 流失节点：识别并优化
  - 次留影响：+10-20%

  最佳实践：
  - 《原神》：开放世界探索引导
  - 《王者荣耀》：MOBA新手教学
  - 《部落冲突》：策略游戏引导

